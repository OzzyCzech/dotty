name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build universal binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Verify and stage binary
        id: stage
        run: |
          BIN=".build/apple/Products/Release/dotty"
          file "$BIN"
          lipo -info "$BIN"
          "$BIN" --version
          ARCHIVE="dotty-${{ steps.version.outputs.version }}-macos-universal.tar.gz"
          tar -C "$(dirname "$BIN")" -czf "$ARCHIVE" dotty
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE="${{ steps.stage.outputs.archive }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ARCHIVE" "$ARCHIVE.sha256" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              "$ARCHIVE" "$ARCHIVE.sha256"
          fi
